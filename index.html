                      style={{ cursor: "pointer", pointerEvents: "all", userSelect: "none" }}
                      onClick={e => { if (isSelected) { e.stopPropagation(); setEditingAnchorName(a.id); } }}
                      onDoubleClick={e => { e.stopPropagation(); setEditingAnchorName(a.id); }}>
                      {(() => {
                        if (a.name.length <= 10) return a.name;
                        const words = a.name.split(" "), lines = [];
                        let cur = "";
                        for (const w of words) { if ((cur + " " + w).trim().length > (r >= 32 ? 12 : 9)) { if (cur) lines.push(cur); cur = w; } else { cur = (cur + " " + w).trim(); } }

                    </text>

                })()}
              </g>

          {/* Always-On section — expanded mode: only unowned items (campaign/initiative-bound ones render in lanes) */}
          {!collapsed && (() => {
            const unownedAO = alwaysOn.filter(ao => !ao.campaign && !ao.initiative);
            if (unownedAO.length === 0) return null;
            const labelY = HEIGHT - MARGIN.bottom - ALWAYS_ON_HEIGHT - ALWAYS_ON_LABEL_HEIGHT + 14;
            const barY = HEIGHT - MARGIN.bottom - ALWAYS_ON_HEIGHT + 4;
            return (
              <g>
                <text x={MARGIN.left + 2} y={labelY} fill="#94A3B8" fontSize={10} fontWeight="700" letterSpacing="0.06em">ALWAYS-ON</text>
                <rect x={MARGIN.left} y={barY} width={WIDTH - MARGIN.left - MARGIN.right} height={ALWAYS_ON_HEIGHT - 8} rx={10} fill="#FAFBFC" stroke="#F1F5F9" strokeWidth={1} />
                {unownedAO.map((ao, ai) => {
                  const aoX = MARGIN.left + 6;
                  const aoW = WIDTH - MARGIN.left - MARGIN.right - 12;
                  return (
                    <g key={ao.id} style={{ cursor: "pointer" }} onClick={e => { e.stopPropagation(); setEditAlwaysOn(ao.id); }}>
                      <rect x={aoX} y={barY + 6 + ai * 26} width={aoW} height={20} rx={8}
                        fill={hexToRgba("#D1D5DB", 0.25)} stroke="#E5E7EB" strokeWidth={1} strokeOpacity={0.5} />
                      <text x={aoX + 10} y={barY + 17 + ai * 26} dominantBaseline="central" fill="#B0B5BC" fontSize={11} fontWeight="600">{ao.name}</text>
                    </g>
                  );
                })}
              </g>
            );
          })()}

          {/* Compounding section — collapsed mode: grouped bars by initiative/campaign */}
          {collapsed && compoundingGroups.length > 0 && (() => {
            const labelY = HEIGHT - MARGIN.bottom - COMPOUNDING_HEIGHT - COMPOUNDING_LABEL_HEIGHT + 14;
            const baseY = HEIGHT - MARGIN.bottom - COMPOUNDING_HEIGHT + 4;
            return (
              <g>
                <text x={MARGIN.left + 2} y={labelY} fill="#94A3B8" fontSize={10} fontWeight="700" letterSpacing="0.06em">ALWAYS-ON</text>
                {compoundingGroups.map((grp, gi) => {
                  const fullW = WIDTH - MARGIN.left - MARGIN.right - 8;
                  const barX = MARGIN.left + 4;
                  const rowY = baseY + gi * 30;
                  const col = grp.color || "#6B7280";
                  const names = grp.items.map(i => i.name).join("  •  ");
                  return (
                    <g key={grp.key}>
                      <rect x={barX} y={rowY} width={fullW} height={24} rx={12}
                        fill="#fff" stroke="none" />
                      <rect x={barX} y={rowY} width={fullW} height={24} rx={12}
                        fill={hexToRgba(col, 0.15)} stroke={col} strokeWidth={1.5} />
                      <text x={barX + 12} y={rowY + 13} dominantBaseline="central" fill={col} fontSize={10} fontWeight="700">
                        {names}
                      </text>
                    </g>
                  );
                })}
              </g>
            );
          })()}
          {/* Drag snap indicator */}
          {dragAnchor?.moved && dragSnapMonth != null && (() => {
            const da = anchors.find(a => a.id === dragAnchor.id);
            if (!da) return null;
            const snapX = monthToX(dragSnapMonth);
            return (
              <g style={{ pointerEvents: "none" }}>
                <line x1={snapX} y1={MARGIN.top - 10} x2={snapX} y2={HEIGHT - MARGIN.bottom}
                  stroke="#374151" strokeWidth={1} strokeDasharray="4,4" opacity={0.3} />
                <text x={snapX} y={MARGIN.top - 14} textAnchor="middle" fill="#374151" fontSize={10} fontWeight="700" opacity={0.6}>
                  {MONTHS[dragSnapMonth]}</text>
              </g>
            );
          })()}

          {/* Top-layer: selected anchor tactic pills — rendered absolutely last so they sit on top of everything */}
          {selectedAnchor && (() => {
            const sa = anchors.find(a => a.id === selectedAnchor.id);
            if (!sa || !isMonthVisible(sa.month)) return null;
            let ax, ay;
            if (collapsed) {
              // In cluster mode, compute position from cluster layout
              const clusterMonth = sa.month;
              const cluster = anchorClusters[clusterMonth];
              if (!cluster) return null;
              const ccx = monthToX(clusterMonth);
              const stagger = visibleMonthCount > 6 ? (clusterMonth % 2 === 0 ? -12 : 12) : 0;
              const ccy = MARGIN.top + CLUSTER_ROW_HEIGHT / 2 + stagger;
              const cAnchors = cluster.anchors;
              const idx = cAnchors.findIndex(a => a.id === sa.id);
              const nn = cAnchors.length;
              const rr = SIZE_RADII[sa.size];
              if (nn === 1) { ax = ccx; ay = ccy; }
              else if (nn === 2) { const off = rr * 0.75; ax = ccx + (idx === 0 ? -off : off); ay = ccy; }
              else { const ang = (idx / nn) * Math.PI * 2 - Math.PI / 2; const ringR = cluster.maxR * 0.6 + 6; ax = ccx + Math.cos(ang) * ringR; ay = ccy + Math.sin(ang) * ringR; }
            } else {
              ax = getAnchorX(sa); ay = getAnchorY(sa);
            }
            const r = SIZE_RADII[sa.size];
            const color = getAnchorColor(sa, campaigns, initiatives);
            const anchorTactics = getTacticsForAnchor(sa.id, tactics);
            const tc = anchorTactics.length;
            if (tc === 0) return null;
            const haloR = r + 8 + tc * 3.5;
            return (<g>
              {anchorTactics.map((t, ti) => {
                const angle = (ti / tc) * Math.PI * 2 - Math.PI / 2;
                const splayR = haloR + 18 + tc * 1.5;
                const tw = t.name.length * 5.8 + 16;
                const rawTx = ax + Math.cos(angle) * splayR, rawTy = ay + Math.sin(angle) * splayR;
                const clampedTy = Math.max(20, Math.min(rawTy, HEIGHT - 20));
                const clampedTx = Math.max(tw / 2 + 4, Math.min(rawTx, WIDTH - tw / 2 - 4));
                const lx = ax + Math.cos(angle) * (haloR + 2), ly = ay + Math.sin(angle) * (haloR + 2);
                return (
                  <g key={`toplayer_pill_${t.id}`}>
                    <line x1={lx} y1={ly} x2={clampedTx} y2={clampedTy} stroke={hexToRgba(color, 0.15)} strokeWidth={1} strokeDasharray="4,3" />
                    <rect x={clampedTx - tw / 2} y={clampedTy - 11} width={tw} height={22} rx={11}
                      fill="#fff" stroke={hexToRgba(color, 0.3)} strokeWidth={1} />
                    <text x={clampedTx} y={clampedTy + 1} textAnchor="middle" dominantBaseline="central"
                      fill={color} fontSize={10} fontWeight="500">{t.name}</text>
                  </g>
                );
              })}
            </g>);
          })()}
        </svg>
      </div>
      </div>{/* end map area */}

      {/* Always-on popover */}
      {editAlwaysOn && (() => {
        const ao = alwaysOn.find(a => a.id === editAlwaysOn);
        if (!ao) return null;
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.2)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }} onClick={() => setEditAlwaysOn(null)}>
            <div style={{ background: "#fff", borderRadius: 14, padding: 24, width: 360, boxShadow: "0 8px 32px rgba(0,0,0,0.12)" }} onClick={e => e.stopPropagation()}>
              <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700, marginBottom: 4 }}>{ao.name}</h3>
              <p style={{ margin: 0, fontSize: 13, color: "#6B7280", marginBottom: 12 }}>Assign to a Campaign, Initiative, or keep as unowned full-year.</p>
              <div style={{ display: "flex", gap: 12, marginBottom: 12 }}>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>Start</label>
                  <select value={ao.startMonth != null ? ao.startMonth : 0}
                    onChange={e => setData(p => ({ ...p, alwaysOn: p.alwaysOn.map(a => a.id === ao.id ? { ...a, startMonth: +e.target.value } : a) }))}
                    style={{ width: "100%", padding: "6px 8px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 12 }}>
                    {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>End</label>
                  <select value={ao.endMonth != null ? ao.endMonth : 11}
                    onChange={e => setData(p => ({ ...p, alwaysOn: p.alwaysOn.map(a => a.id === ao.id ? { ...a, endMonth: +e.target.value } : a) }))}
                    style={{ width: "100%", padding: "6px 8px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 12 }}>
                    {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>Frequency</label>
                  <select value={ao.frequency || "monthly"}
                    onChange={e => setData(p => ({ ...p, alwaysOn: p.alwaysOn.map(a => a.id === ao.id ? { ...a, frequency: e.target.value } : a) }))}
                    style={{ width: "100%", padding: "6px 8px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 12 }}>
                    {FREQ_OPTIONS.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
                  </select>
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <button onClick={() => { setData(p => ({ ...p, alwaysOn: p.alwaysOn.map(a => a.id === ao.id ? { ...a, campaign: null, initiative: null } : a) })); setEditAlwaysOn(null); }}
                  style={{ padding: "8px 14px", borderRadius: 8, border: (!ao.campaign && !ao.initiative) ? `2px solid ${BC}` : "1px solid #D1D5DB", background: (!ao.campaign && !ao.initiative) ? hexToRgba(BC, 0.08) : "#fff", color: (!ao.campaign && !ao.initiative) ? BC : "#6B7280", fontSize: 13, fontWeight: 600, cursor: "pointer", textAlign: "left" }}>
                  Full Year (no owner)</button>
                {initiatives.length > 0 && <label style={{ ...labelStyle, marginTop: 4, marginBottom: 0 }}>Initiative</label>}
                {initiatives.map(ini => {
                  const sel = ao.initiative === ini.id;
                  return (
                    <button key={ini.id} onClick={() => { setAlwaysOnInitiative(ao.id, ini.id); setEditAlwaysOn(null); }}
                      style={{ padding: "8px 14px", borderRadius: 8, border: sel ? `2px solid ${ini.color}` : "1px solid #D1D5DB", background: sel ? hexToRgba(ini.color, 0.08) : "#fff", color: sel ? ini.color : "#6B7280", fontSize: 13, fontWeight: 600, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ width: 8, height: 8, borderRadius: "50%", background: ini.color }} />{ini.name}</button>
                  );
                })}
                {campaigns.length > 0 && <label style={{ ...labelStyle, marginTop: 4, marginBottom: 0 }}>Campaign</label>}
                {campaigns.map(c => {
                  const col = getCampaignInitiativeColor(c.id, campaigns, initiatives);
                  const sel = ao.campaign === c.id;
                  return (
                    <button key={c.id} onClick={() => { toggleAlwaysOnCampaign(ao.id, c.id); setEditAlwaysOn(null); }}
                      style={{ padding: "8px 14px", borderRadius: 8, border: sel ? `2px solid ${col}` : "1px solid #D1D5DB", background: sel ? hexToRgba(col, 0.08) : "#fff", color: sel ? col : "#6B7280", fontSize: 13, fontWeight: 600, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ width: 8, height: 8, borderRadius: "50%", background: col }} />{c.name} ({MONTHS[c.startMonth]}–{MONTHS[c.endMonth]})</button>
                  );
                })}
              </div>
              <div style={{ marginTop: 12, paddingTop: 10, borderTop: "1px solid #F1F5F9", textAlign: "right" }}>
                <span onClick={() => { setData(p => ({ ...p, alwaysOn: p.alwaysOn.filter(a => a.id !== ao.id) })); setEditAlwaysOn(null); }}
                  style={{ fontSize: 12, color: "#EF4444", cursor: "pointer", fontWeight: 500 }}>Remove tactic</span>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Campaign tactic edit popover */}
      {editCampTactic && (() => {
        const ct = tactics.find(t => t.id === editCampTactic);
        if (!ct) { setEditCampTactic(null); return null; }
        const camp = ct.campaign ? campaigns.find(c => c.id === ct.campaign) : null;
        const ctColor = camp ? getCampaignInitiativeColor(camp.id, campaigns, initiatives) : "#6B7280";
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.2)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }} onClick={() => setEditCampTactic(null)}>
            <div style={{ background: "#fff", borderRadius: 14, padding: 24, width: 360, boxShadow: "0 8px 32px rgba(0,0,0,0.12)" }} onClick={e => e.stopPropagation()}>
              <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700, marginBottom: 4 }}>{ct.name}</h3>
              <p style={{ margin: 0, fontSize: 13, color: "#6B7280", marginBottom: 12 }}>Campaign-level tactic{camp ? ` on ${camp.name}` : ""}</p>
              <div style={{ display: "flex", gap: 12, marginBottom: 12 }}>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>Start</label>
                  <select value={ct.startMonth != null ? ct.startMonth : (camp ? camp.startMonth : 0)}
                    onChange={e => setData(p => ({ ...p, tactics: p.tactics.map(t => t.id === ct.id ? { ...t, startMonth: +e.target.value } : t) }))}
                    style={{ width: "100%", padding: "6px 8px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 12 }}>
                    {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>End</label>
                  <select value={ct.endMonth != null ? ct.endMonth : (camp ? camp.endMonth : 11)}
                    onChange={e => setData(p => ({ ...p, tactics: p.tactics.map(t => t.id === ct.id ? { ...t, endMonth: +e.target.value } : t) }))}
                    style={{ width: "100%", padding: "6px 8px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 12 }}>
                    {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>Frequency</label>
                  <select value={ct.frequency || "monthly"}
                    onChange={e => setData(p => ({ ...p, tactics: p.tactics.map(t => t.id === ct.id ? { ...t, frequency: e.target.value } : t) }))}
                    style={{ width: "100%", padding: "6px 8px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 12 }}>
                    {FREQ_OPTIONS.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
                  </select>
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <label style={labelStyle}>Reassign to Campaign</label>
                {campaigns.map(c => {
                  const col = getCampaignInitiativeColor(c.id, campaigns, initiatives);
                  const sel = ct.campaign === c.id;
                  return (
                    <button key={c.id} onClick={() => { setData(p => ({ ...p, tactics: p.tactics.map(t => t.id === ct.id ? { ...t, campaign: c.id } : t) })); setEditCampTactic(null); }}
                      style={{ padding: "8px 14px", borderRadius: 8, border: sel ? `2px solid ${col}` : "1px solid #D1D5DB", background: sel ? hexToRgba(col, 0.08) : "#fff", color: sel ? col : "#6B7280", fontSize: 13, fontWeight: 600, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ width: 8, height: 8, borderRadius: "50%", background: col }} />{c.name} ({MONTHS[c.startMonth]}–{MONTHS[c.endMonth]})</button>
                  );
                })}
              </div>
              <div style={{ marginTop: 12, paddingTop: 10, borderTop: "1px solid #F1F5F9", textAlign: "right" }}>
                <span onClick={() => { setData(p => ({ ...p, tactics: p.tactics.filter(t => t.id !== ct.id) })); setEditCampTactic(null); }}
                  style={{ fontSize: 12, color: "#EF4444", cursor: "pointer", fontWeight: 500 }}>Remove tactic</span>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Campaign edit modal */}
      {editCampaign && (() => {
        const camp = campaigns.find(c => c.id === editCampaign);
        if (!camp) { setEditCampaign(null); return null; }
        const campIni = camp.initiative ? initiatives.find(i => i.id === camp.initiative) : null;
        const col = campIni ? campIni.color : "#6B7280";
        const campTacticCount = tactics.filter(t => t.campaign === camp.id && !t.anchor).length;
        const campAOCount = alwaysOn.filter(ao => ao.campaign === camp.id).length;
        const campAnchorCount = anchors.filter(a => (a.campaigns || []).includes(camp.id)).length;
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.2)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }} onClick={() => { setEditCampaign(null); setConfirmDeleteCampaign(false); }}>
            <div style={{ background: "#fff", borderRadius: 14, padding: 24, width: 400, boxShadow: "0 8px 32px rgba(0,0,0,0.12)" }} onClick={e => e.stopPropagation()}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
                <span style={{ width: 10, height: 10, borderRadius: "50%", background: col }} />
                <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700 }}>Edit Campaign</h3>
              </div>

              <label style={labelStyle}>Name</label>
              <input value={camp.name} onChange={e => setData(p => ({ ...p, campaigns: p.campaigns.map(c => c.id === camp.id ? { ...c, name: e.target.value } : c) }))}
                style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 14, marginBottom: 12, boxSizing: "border-box" }} />

              <label style={labelStyle}>Initiative</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                {initiatives.map(ini => {
                  const sel = camp.initiative === ini.id;
                  return (
                    <button key={ini.id} onClick={() => setData(p => ({ ...p, campaigns: p.campaigns.map(c => c.id === camp.id ? { ...c, initiative: ini.id } : c) }))}
                      style={{ padding: "6px 12px", borderRadius: 8, border: sel ? `2px solid ${ini.color}` : "1px solid #D1D5DB", background: sel ? hexToRgba(ini.color, 0.08) : "#fff", color: sel ? ini.color : "#6B7280", fontSize: 12, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ width: 8, height: 8, borderRadius: "50%", background: ini.color }} />{ini.name}
                    </button>
                  );
                })}
              </div>

              <div style={{ display: "flex", gap: 12, marginBottom: 12 }}>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>Start Month</label>
                  <select value={camp.startMonth} onChange={e => setData(p => ({ ...p, campaigns: p.campaigns.map(c => c.id === camp.id ? { ...c, startMonth: +e.target.value } : c) }))}
                    style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 13 }}>
                    {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
                <div style={{ flex: 1 }}>
                  <label style={labelStyle}>End Month</label>
                  <select value={camp.endMonth} onChange={e => setData(p => ({ ...p, campaigns: p.campaigns.map(c => c.id === camp.id ? { ...c, endMonth: +e.target.value } : c) }))}
                    style={{ width: "100%", padding: "8px 10px", borderRadius: 8, border: "1px solid #D1D5DB", fontSize: 13 }}>
                    {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
              </div>

              {(campTacticCount + campAOCount + campAnchorCount) > 0 && (
                <div style={{ padding: "8px 12px", borderRadius: 8, background: "#F9FAFB", fontSize: 12, color: "#6B7280", marginBottom: 12 }}>
                  This campaign has {campAnchorCount > 0 ? `${campAnchorCount} anchor${campAnchorCount > 1 ? "s" : ""}` : ""}{campAnchorCount > 0 && (campTacticCount + campAOCount) > 0 ? ", " : ""}{(campTacticCount + campAOCount) > 0 ? `${campTacticCount + campAOCount} tactic${(campTacticCount + campAOCount) > 1 ? "s" : ""}` : ""}
                </div>
              )}

              <div style={{ marginTop: 12, paddingTop: 10, borderTop: "1px solid #F1F5F9" }}>
                {!confirmDeleteCampaign ? (
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span onClick={() => setConfirmDeleteCampaign(true)}
                      style={{ fontSize: 12, color: "#EF4444", cursor: "pointer", fontWeight: 500 }}>Delete campaign</span>
                    <button onClick={() => { setEditCampaign(null); setConfirmDeleteCampaign(false); }}
                      style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: col, color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Done</button>
                  </div>
                ) : (
                  <div style={{ background: "#FEF2F2", borderRadius: 8, padding: 12 }}>
                    <p style={{ margin: 0, fontSize: 12, color: "#991B1B", marginBottom: 8 }}>Delete "{camp.name}"? Anchors and tactics will be unlinked but not deleted.</p>
                    <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                      <button onClick={() => setConfirmDeleteCampaign(false)}
                        style={{ padding: "6px 12px", borderRadius: 6, border: "1px solid #D1D5DB", background: "#fff", color: "#6B7280", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Cancel</button>
                      <button onClick={() => {
                        const cId = camp.id;
                        setData(p => ({
                          ...p,
                          campaigns: p.campaigns.filter(c => c.id !== cId),
                          anchors: p.anchors.map(a => ({ ...a, campaigns: (a.campaigns || []).filter(cc => cc !== cId), primaryCampaign: a.primaryCampaign === cId ? ((a.campaigns || []).filter(cc => cc !== cId)[0] || "") : a.primaryCampaign })),
                          tactics: p.tactics.map(t => t.campaign === cId ? { ...t, campaign: null } : t),
                          alwaysOn: p.alwaysOn.map(ao => ao.campaign === cId ? { ...ao, campaign: null } : ao),
                        }));
                        setConfirmDeleteCampaign(false);
                        setEditCampaign(null);
                      }} style={{ padding: "6px 12px", borderRadius: 6, border: "none", background: "#EF4444", color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Yes, delete</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })()}

      {/* Detail panel */}
      {selectedAnchor && (() => {
        const sa = anchors.find(a => a.id === selectedAnchor.id) || selectedAnchor;
        const at = getTacticsForAnchor(sa.id, tactics);
        const col = getAnchorColor(sa, campaigns, initiatives);
        const unassignedCampaigns = campaigns.filter(c => !(sa.campaigns || []).includes(c.id));
        const anchorLinksForThis = anchorLinks.filter(l => l.from === sa.id || l.to === sa.id);
        const linkableAnchors = anchors.filter(a => a.id !== sa.id && !anchorLinksForThis.some(l => (l.from === sa.id && l.to === a.id) || (l.to === sa.id && l.from === a.id)));
        return (
          <div className="no-print" style={{ marginTop: 16, background: "#fff", border: "1px solid #E5E7EB", borderRadius: 12, padding: 20, display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 20 }}>
            <div>
              <div style={{ fontSize: 10, color: "#94A3B8", textTransform: "uppercase", fontWeight: 600, letterSpacing: "0.06em", marginBottom: 4 }}>Anchor</div>
              {editingAnchorName === sa.id ? (
                <input autoFocus
                  value={sa.name}
                  onChange={e => { const val = e.target.value; setData(p => ({ ...p, anchors: p.anchors.map(aa => aa.id === sa.id ? { ...aa, name: val } : aa) })); }}
                  onBlur={() => setEditingAnchorName(null)}
                  onKeyDown={e => { if (e.key === "Enter") setEditingAnchorName(null); }}
                  style={{ fontSize: 20, fontWeight: 700, color: "#1F2937", background: "transparent", border: "none", borderBottom: `2px solid ${col}`, outline: "none", fontFamily: "inherit", padding: 0, width: "100%" }} />
              ) : (
                <div style={{ fontSize: 20, fontWeight: 700, color: "#1F2937", cursor: "pointer", borderBottom: "2px solid transparent" }}
                  onClick={() => setEditingAnchorName(sa.id)}
                  onMouseEnter={e => e.currentTarget.style.borderBottomColor = col}
                  onMouseLeave={e => e.currentTarget.style.borderBottomColor = "transparent"}>{sa.name}</div>
              )}
              <div style={{ fontSize: 13, color: "#6B7280", marginTop: 4 }}>{thresholds[sa.size].label} (≤{formatMoney(thresholds[sa.size].maxSpend)}) · {MONTHS[sa.month]}</div>
              <div style={{ display: "flex", gap: 4, marginTop: 8 }}>
                {["S", "M", "L"].map(s => (
                  <button key={s} onClick={() => {
                    setData(p => ({ ...p, anchors: p.anchors.map(a => a.id === sa.id ? { ...a, size: s } : a) }));
                    setSelectedAnchor(prev => prev ? { ...prev, size: s } : prev);
                  }}
                    style={{ padding: "4px 10px", borderRadius: 6, border: sa.size === s ? `2px solid ${col}` : "1px solid #D1D5DB", background: sa.size === s ? hexToRgba(col, 0.08) : "#fff", color: sa.size === s ? col : "#6B7280", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                    {thresholds[s].label}</button>
                ))}
              </div>
              <button onClick={() => removeAnchor(sa.id)}
                style={{ marginTop: 10, padding: "4px 12px", borderRadius: 6, border: "1px solid #FECACA", background: "#FEF2F2", color: "#EF4444", fontSize: 12, cursor: "pointer", fontWeight: 500 }}>Remove</button>
            </div>
            <div>
              <div style={{ fontSize: 10, color: "#94A3B8", textTransform: "uppercase", fontWeight: 600, letterSpacing: "0.06em", marginBottom: 6 }}>Initiative</div>
              {(() => {
                const anchorIniId = getAnchorInitiative(sa, campaigns);
                const anchorIni = anchorIniId ? initiatives.find(i => i.id === anchorIniId) : null;
                if (!anchorIni) return <span style={{ fontSize: 12, color: "#94A3B8", marginBottom: 10, display: "block" }}>No initiative</span>;
                return editingIniName === anchorIni.id ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10 }}>
                    <span style={{ width: 10, height: 10, borderRadius: "50%", background: anchorIni.color, flexShrink: 0 }} />
                    <input autoFocus
                      value={anchorIni.name}
                      onChange={e => { const val = e.target.value; setData(p => ({ ...p, initiatives: p.initiatives.map(i => i.id === anchorIni.id ? { ...i, name: val } : i) })); }}
                      onBlur={() => setEditingIniName(null)}
                      onKeyDown={e => { if (e.key === "Enter") setEditingIniName(null); }}
                      style={{ fontSize: 13, fontWeight: 600, color: anchorIni.color, background: "transparent", border: "none", borderBottom: `2px solid ${anchorIni.color}`, outline: "none", fontFamily: "inherit", padding: 0, flex: 1 }} />
                  </div>
                ) : (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 10, cursor: "pointer" }}
                    onClick={() => setEditingIniName(anchorIni.id)}
                    onMouseEnter={e => e.currentTarget.querySelector('.ini-name').style.borderBottomColor = anchorIni.color}
                    onMouseLeave={e => e.currentTarget.querySelector('.ini-name').style.borderBottomColor = "transparent"}>
                    <span style={{ width: 10, height: 10, borderRadius: "50%", background: anchorIni.color }} />
                    <span className="ini-name" style={{ fontSize: 13, color: anchorIni.color, fontWeight: 600, borderBottom: "2px solid transparent", transition: "border-color 0.15s" }}>{anchorIni.name}</span>
                  </div>
                );
              })()}
              {campaigns.length > 0 && <div style={{ fontSize: 10, color: "#94A3B8", textTransform: "uppercase", fontWeight: 600, letterSpacing: "0.06em", marginBottom: 4, marginTop: 4 }}>Campaigns <span style={{ fontWeight: 400, textTransform: "none" }}>(optional)</span></div>}
              {(sa.campaigns || []).length === 0 && campaigns.length > 0 && <span style={{ fontSize: 12, color: "#94A3B8" }}>No campaigns</span>}
              {(sa.campaigns || []).map(cId => {
                const camp = campaigns.find(cc => cc.id === cId);
                if (!camp) return null;
                const cCol = getCampaignInitiativeColor(cId, campaigns, initiatives);
                const isPrimary = sa.primaryCampaign === cId;
                return (
                  <div key={cId} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                    <span style={{ width: 8, height: 8, borderRadius: "50%", background: cCol }} />
                    <span style={{ fontSize: 13, color: "#374151", fontWeight: 500 }}>{camp.name}</span>
                    {isPrimary && (sa.campaigns || []).length > 1 && <span style={{ fontSize: 9, fontWeight: 700, color: cCol, background: hexToRgba(cCol, 0.1), padding: "1px 6px", borderRadius: 4 }}>PRIMARY</span>}
                    <span onClick={() => removeCampaignFromAnchor(sa.id, cId)} style={{ cursor: "pointer", opacity: 0.4, fontSize: 13, lineHeight: 1, marginLeft: 2 }}>×</span>
                  </div>
                );
              })}
              {unassignedCampaigns.length > 0 && (
                <div style={{ marginTop: 8 }}>
                  <select style={{ ...inputStyle, padding: "6px 10px", fontSize: 12, color: "#6B7280" }} value=""
                    onChange={e => { if (e.target.value) addCampaignToAnchor(sa.id, e.target.value); }}>
                    <option value="">+ Add Campaign...</option>
                    {unassignedCampaigns.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
              )}
            </div>
            <div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                <div style={{ fontSize: 10, color: "#94A3B8", textTransform: "uppercase", fontWeight: 600, letterSpacing: "0.06em" }}>Tactics ({at.length})</div>
                <button onClick={() => setShowAddTactic(sa.id)}
                  style={{ padding: "3px 10px", borderRadius: 6, border: "1px solid #D1D5DB", background: "#fff", color: BC, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>+ Add</button>
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {at.map(t => {
                  const tCol = getAnchorColor(sa, campaigns, initiatives);
                  return (
                    <span key={t.id} style={{ padding: "4px 10px", borderRadius: 12, fontSize: 11, fontWeight: 500, display: "inline-flex", alignItems: "center", gap: 6, background: hexToRgba(tCol, 0.07), color: darken(tCol, 0.1), border: `1px solid ${hexToRgba(tCol, 0.18)}` }}>
                      {t.name}<span style={{ cursor: "pointer", opacity: 0.4, fontSize: 13, lineHeight: 1 }} onClick={() => removeTactic(t.id)}>×</span></span>
                  );
                })}
                {at.length === 0 && <span style={{ fontSize: 12, color: "#94A3B8" }}>No Tactics yet</span>}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 10, color: "#94A3B8", textTransform: "uppercase", fontWeight: 600, letterSpacing: "0.06em", marginBottom: 6 }}>Linked Anchors</div>
              {anchorLinksForThis.map(link => {
                const otherId = link.from === sa.id ? link.to : link.from;
                const other = anchors.find(a => a.id === otherId);
                const direction = link.from === sa.id ? "→" : "←";
                return (
                  <div key={link.id} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                    <span style={{ fontSize: 12, color: "#94A3B8" }}>{direction}</span>
                    <span style={{ fontSize: 13, color: "#374151", fontWeight: 500 }}>{other?.name || "?"}</span>
                    {link.label && <span style={{ fontSize: 10, color: "#94A3B8" }}>({link.label})</span>}
                    <span onClick={() => removeAnchorLink(link.id)} style={{ cursor: "pointer", opacity: 0.4, fontSize: 13, lineHeight: 1, marginLeft: 2 }}>×</span>
                  </div>
                );
              })}
              {anchorLinksForThis.length === 0 && <span style={{ fontSize: 12, color: "#94A3B8" }}>No links yet</span>}
              {linkableAnchors.length > 0 && (
                <div style={{ marginTop: 8 }}>
                  <select style={{ ...inputStyle, padding: "6px 10px", fontSize: 12, color: "#6B7280" }} value=""
                    onChange={e => { if (e.target.value) addAnchorLink({ id: uid(), from: sa.id, to: e.target.value, label: "" }); }}>
                    <option value="">+ Link to Anchor...</option>
                    {linkableAnchors.map(a => <option key={a.id} value={a.id}>{a.name} ({MONTHS[a.month]})</option>)}
                  </select>
                </div>
              )}
            </div>
          </div>
        );
      })()}



      {/* Copyright + CTA footer */}
      <div style={{ textAlign: "center", padding: "12px 0 8px", fontSize: 11, color: "#9CA3AF" }}>
        © {new Date().getFullYear()} Jeni Bishop. All rights reserved.
      </div>

      {showAddModal && <AddModal data={data} setData={setData} onClose={() => setShowAddModal(false)} />}
      {showAddTactic && <AddTacticModal anchorName={anchors.find(a => a.id === showAddTactic)?.name || ""} onAdd={addTactic} onClose={() => setShowAddTactic(null)} data={data} setData={setData} />}

      {/* Guided tour overlay */}
      {tourStep > 0 && <TourOverlay step={tourStep} onNext={advanceTour} onSkip={skipTour} containerEl={containerRef.current} />}
    </div>
  );
}

// ─── PERSISTENCE HELPERS ─────────────────────────────────────────────────────

const STORAGE_KEY = "mmm_data";
const STORAGE_MODE_KEY = "mmm_mode";

function saveToStorage(data, mode) {
  try {
    if (data && mode === "map") {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      localStorage.setItem(STORAGE_MODE_KEY, mode);
    }
  } catch (e) { /* storage full or unavailable */ }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const mode = localStorage.getItem(STORAGE_MODE_KEY);
    if (raw && mode === "map") return { data: JSON.parse(raw), mode };
  } catch (e) { /* parse error */ }
  return null;
}

function clearStorage() {
  try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(STORAGE_MODE_KEY); } catch (e) {}
}

function encodeShareHash(data) {
  try { return btoa(encodeURIComponent(JSON.stringify(data))); } catch (e) { return null; }
}

function decodeShareHash(hash) {
  try { return JSON.parse(decodeURIComponent(atob(hash))); } catch (e) { return null; }
}

// ─── ROOT ────────────────────────────────────────────────────────────────────

function MarketingMomentumMap() {
  const [mode, setMode] = useState("choose");
  const [data, setData] = useState(null);
  const [savedUserData, setSavedUserData] = useState(null);
  const [isSampleMode, setIsSampleMode] = useState(false);
  const [initialized, setInitialized] = useState(false);

  // On mount: check URL hash first, then localStorage
  useEffect(() => {
    const hash = window.location.hash.slice(1);
    if (hash && hash.startsWith("map=")) {
      const decoded = decodeShareHash(hash.slice(4));
      if (decoded) { setData(decoded); setMode("map"); setInitialized(true); return; }
    }
    const saved = loadFromStorage();
    if (saved) { setData(saved.data); setMode("map"); setInitialized(true); return; }
    setInitialized(true);
  }, []);

  // Auto-save when data changes (skip sample mode)
  useEffect(() => {
    if (initialized && data && mode === "map" && !isSampleMode) {
      saveToStorage(data, mode);
    }
  }, [data, mode, isSampleMode, initialized]);

  function loadSample() {
    if (data && !isSampleMode) setSavedUserData(data);
    setData({
      clientName: "Sample Company", year: "2026",
      thresholds: { ...DEFAULT_THRESHOLDS },
      initiatives: DEFAULT_INITIATIVES, campaigns: DEFAULT_CAMPAIGNS,
      anchors: DEFAULT_ANCHORS, tactics: DEFAULT_TACTICS,
      alwaysOn: DEFAULT_ALWAYS_ON, anchorLinks: DEFAULT_ANCHOR_LINKS,
    });
    setIsSampleMode(true);
    setMode("map");
  }

  function handleShare() {
    if (!data) return;
    const hash = encodeShareHash(data);
    if (!hash) return;
    const url = window.location.origin + window.location.pathname + "#map=" + hash;
    navigator.clipboard.writeText(url).then(() => {
      alert("Shareable link copied to clipboard! Anyone with this link can view your interactive map.");
    }).catch(() => {
      prompt("Copy this shareable link:", url);
    });
  }

  function handleExportJSON() {
    if (!data) return;
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${(data.clientName || "my-map").replace(/[^a-zA-Z0-9]/g, "-").toLowerCase()}-momentum-map.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function handleImportJSON(e) {
    const file = e?.target?.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (parsed && parsed.initiatives && parsed.anchors) {
          setData(parsed);
          setSavedUserData(null);
          setIsSampleMode(false);
          setMode("map");
          saveToStorage(parsed, "map");
        } else {
          alert("This file doesn't appear to be a valid Momentum Map. It should contain initiatives, anchors, and other map data.");
        }
      } catch (err) {
        alert("Could not read this file. Please make sure it's a valid .json file exported from a Momentum Map.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  function handleImportShareLink(link) {
    if (!link) return false;
    try {
      let hash = link.trim();
      // Extract hash from full URL
      if (hash.includes("#map=")) hash = hash.split("#map=")[1];
      else if (hash.startsWith("map=")) hash = hash.slice(4);
      const decoded = decodeShareHash(hash);
      if (decoded && decoded.initiatives && decoded.anchors) {
        setData(decoded);
        setSavedUserData(null);
        setIsSampleMode(false);
        setMode("map");
        saveToStorage(decoded, "map");
        return true;
      }
    } catch (e) {}
    alert("Could not load this share link. Please check that the full URL was pasted correctly.");
    return false;
  }

  function handleImportFullCSV(e) {
    const file = e?.target?.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const result = parseFullMapCSV(ev.target.result);
        if (result) {
          setData(result);
          setSavedUserData(null);
          setIsSampleMode(false);
          setMode("map");
          saveToStorage(result, "map");
        } else {
          alert("Could not parse this CSV. Make sure it has columns: Type, Name — and rows for your Initiatives, Campaigns, and Anchors. See the template for the expected format.");
        }
      } catch (err) {
        alert("Error reading CSV file. Please check the format and try again.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  if (!initialized) return null;

  if (mode === "choose") {
    const hasSaved = !!loadFromStorage();
    return (
      <div style={{ fontFamily: "'Inter',-apple-system,sans-serif", background: "#F8FAFC", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ textAlign: "center", maxWidth: 480 }}>
          {/* Hero graphic — abstract momentum map illustration */}
          <svg width="340" height="140" viewBox="0 0 340 140" fill="none" style={{ margin: "0 auto 20px", display: "block" }}>
            {/* Soft column dividers */}
            {[65,115,165,215,265].map(x => <line key={x} x1={x} y1={10} x2={x} y2={130} stroke="#F1F5F9" strokeWidth={1} />)}
            {/* Alternating column tints */}
            <rect x={115} y={10} width={50} height={120} fill="#FAFBFC" />
            <rect x={215} y={10} width={50} height={120} fill="#FAFBFC" />

            {/* Halos — greens dominant, purples supporting */}
            <circle cx={80} cy={50} r={48} fill="rgba(213,213,111,0.07)" stroke="rgba(213,213,111,0.13)" strokeWidth={0.8} />
            <circle cx={80} cy={50} r={60} fill="none" stroke="rgba(213,213,111,0.05)" strokeWidth={0.6} />
            <circle cx={175} cy={54} r={42} fill="rgba(158,151,59,0.07)" stroke="rgba(158,151,59,0.12)" strokeWidth={0.8} />
            <circle cx={175} cy={54} r={52} fill="none" stroke="rgba(158,151,59,0.05)" strokeWidth={0.6} />
            <circle cx={250} cy={52} r={36} fill="rgba(203,200,229,0.08)" stroke="rgba(203,200,229,0.14)" strokeWidth={0.8} />
            <circle cx={250} cy={52} r={46} fill="none" stroke="rgba(203,200,229,0.06)" strokeWidth={0.6} />
            <circle cx={310} cy={58} r={24} fill="rgba(202,154,196,0.07)" stroke="rgba(202,154,196,0.1)" strokeWidth={0.8} />

            {/* Anchor circles — greens dominant, purples supporting */}
            {/* Back layer: L anchors */}
            <circle cx={80} cy={50} r={28} fill="#d5d56f" opacity={0.9} stroke="#fff" strokeWidth={2.5} />
            <circle cx={175} cy={54} r={24} fill="#9e973b" opacity={0.9} stroke="#fff" strokeWidth={2.5} />
            <circle cx={250} cy={52} r={20} fill="#cbc8e5" opacity={0.9} stroke="#fff" strokeWidth={2.5} />
            {/* Mid layer: M anchors */}
            <circle cx={125} cy={60} r={15} fill="#ca9ac4" opacity={0.88} stroke="#fff" strokeWidth={2} />
            <circle cx={215} cy={44} r={13} fill="#d5d56f" opacity={0.88} stroke="#fff" strokeWidth={2} />
            <circle cx={310} cy={58} r={12} fill="#ca9ac4" opacity={0.88} stroke="#fff" strokeWidth={2} />
            {/* Front layer: S anchors */}
            <circle cx={55} cy={38} r={10} fill="#9e973b" opacity={0.85} stroke="#fff" strokeWidth={1.5} />
            <circle cx={155} cy={66} r={9} fill="#cbc8e5" opacity={0.85} stroke="#fff" strokeWidth={1.5} />
            <circle cx={280} cy={62} r={8} fill="#d5d56f" opacity={0.85} stroke="#fff" strokeWidth={1.5} />

            {/* Selection pulse animation on the large green anchor */}
            <circle cx={80} cy={50} r={28} fill="none" stroke="#d5d56f" strokeWidth={2} opacity={0.3}>
              <animate attributeName="r" from="30" to="56" dur="2s" repeatCount="indefinite" />
              <animate attributeName="opacity" from="0.35" to="0" dur="2s" repeatCount="indefinite" />
            </circle>
            <circle cx={80} cy={50} r={32} fill="none" stroke="#d5d56f" strokeWidth={1.5} opacity={0.15}>
              <animate attributeName="r" from="34" to="62" dur="2s" begin="0.4s" repeatCount="indefinite" />
              <animate attributeName="opacity" from="0.2" to="0" dur="2s" begin="0.4s" repeatCount="indefinite" />
            </circle>

            {/* Subtle tactic dot trails — greens longest, purples shorter */}
            {[24,38,52,66,80,94,108,122,136,150,164,178].map((x,i) => <circle key={`t1_${i}`} cx={x} cy={96} r={1.4} fill="#d5d56f" opacity={0.12 + i * 0.025} />)}
            {[60,76,92,108,124,140,156,172,188,204].map((x,i) => <circle key={`t2_${i}`} cx={x} cy={104} r={1.4} fill="#9e973b" opacity={0.1 + i * 0.03} />)}
            {[140,158,176,194,212,230,248,266].map((x,i) => <circle key={`t3_${i}`} cx={x} cy={112} r={1.4} fill="#cbc8e5" opacity={0.12 + i * 0.03} />)}
            {[220,240,260,280,300,320].map((x,i) => <circle key={`t4_${i}`} cx={x} cy={120} r={1.3} fill="#ca9ac4" opacity={0.1 + i * 0.04} />)}
          </svg>
          <h1 style={{ fontSize: 32, fontWeight: 700, color: "#1F2937", marginBottom: 8 }}>Marketing Momentum Map</h1>
          <p style={{ fontSize: 15, color: "#6B7280", marginBottom: 32, lineHeight: 1.6 }}>Visualize your campaigns, anchors, and tactics on one timeline.</p>

          {/* Primary CTAs */}
          <div style={{ display: "flex", flexDirection: "column", gap: 12, alignItems: "center", marginBottom: 24 }}>
            {hasSaved && (
              <button onClick={() => { const s = loadFromStorage(); if (s) { setData(s.data); setMode("map"); } }}
                style={{ padding: "14px 32px", borderRadius: 12, border: "none", cursor: "pointer", fontSize: 15, fontWeight: 600, background: BC, color: BC_TEXT, boxShadow: `0 2px 8px ${hexToRgba(BC, 0.3)}`, width: 260 }}>Continue Where You Left Off</button>
            )}
            <button onClick={() => setMode("setup")}
              style={{ padding: "14px 32px", borderRadius: 12, border: "none", cursor: "pointer", fontSize: 15, fontWeight: 600, background: hasSaved ? "#374151" : BC, color: hasSaved ? "#fff" : BC_TEXT, boxShadow: hasSaved ? "none" : `0 2px 8px ${hexToRgba(BC, 0.3)}`, width: 260 }}>
              {hasSaved ? "Start Fresh" : "Get Started"}</button>
          </div>

          {/* CSV upload — inline, compact */}
          <div style={{ marginBottom: 20 }}>
            <label style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "10px 20px", borderRadius: 10, border: "1px solid #D1D5DB", cursor: "pointer", fontSize: 13, fontWeight: 500, background: "#fff", color: "#374151", transition: "all 0.15s" }}
              onMouseEnter={e => e.currentTarget.style.borderColor = BC} onMouseLeave={e => e.currentTarget.style.borderColor = "#D1D5DB"}>
              <span style={{ fontSize: 15 }}>↑</span> Upload .csv to skip ahead
              <input type="file" accept=".csv,.txt" style={{ display: "none" }} onChange={handleImportFullCSV} />
            </label>
            <div style={{ marginTop: 6 }}>
              <a href="https://docs.google.com/spreadsheets/d/1y5apU6Hppfc4ie9GJbl0mwzPZVIYp7ckDkmFPx9JIKk/edit?usp=sharing" target="_blank" rel="noopener noreferrer"
                style={{ fontSize: 11, color: "#9CA3AF", textDecoration: "none", borderBottom: "1px solid #E5E7EB" }}>Download template</a>
            </div>
          </div>

          {/* Secondary links */}
          <div style={{ display: "flex", gap: 16, justifyContent: "center", alignItems: "center", marginBottom: 32 }}>
            <span onClick={loadSample} style={{ fontSize: 12, color: "#9CA3AF", cursor: "pointer", borderBottom: "1px solid #E5E7EB" }}
              onMouseEnter={e => e.target.style.color = "#6B7280"} onMouseLeave={e => e.target.style.color = "#9CA3AF"}>View sample data</span>
            <span style={{ color: "#E5E7EB" }}>·</span>
            <label style={{ fontSize: 12, color: "#9CA3AF", cursor: "pointer", borderBottom: "1px solid #E5E7EB" }}
              onMouseEnter={e => e.currentTarget.style.color = "#6B7280"} onMouseLeave={e => e.currentTarget.style.color = "#9CA3AF"}>
              Load .json file
              <input type="file" accept=".json" style={{ display: "none" }} onChange={handleImportJSON} />
            </label>
            <span style={{ color: "#E5E7EB" }}>·</span>
            <span onClick={() => {
              const link = prompt("Paste your share link here:\n\n(The full URL that starts with http and contains #map=)");
              if (link) handleImportShareLink(link);
            }}
              style={{ fontSize: 12, color: "#9CA3AF", cursor: "pointer", borderBottom: "1px solid #E5E7EB" }}
              onMouseEnter={e => e.target.style.color = "#6B7280"} onMouseLeave={e => e.target.style.color = "#9CA3AF"}>Paste share link</span>
          </div>

          {/* Footer */}
          <div>
            <p style={{ fontSize: 12, color: "#C0C5CC", marginBottom: 6 }}>&copy; {new Date().getFullYear()} Jeni Bishop</p>
            <p style={{ fontSize: 12, color: "#9CA3AF", lineHeight: 1.5 }}>
              Ready to build marketing that compounds?{" "}
              <a href="https://jenibishop.com/contact/" target="_blank" rel="noopener noreferrer"
                style={{ color: darken(BC, 0.25), fontWeight: 600, textDecoration: "none", borderBottom: `1px solid ${hexToRgba(BC, 0.4)}` }}>Let's chat</a>
            </p>
          </div>
        </div>
      </div>
    );
  }

  function handleReset(target) {
    if (target === "sample") {
      loadSample();
    } else if (target === "mymap") {
      if (savedUserData) {
        setData(savedUserData);
        setIsSampleMode(false);
        setMode("map");
      }
    } else if (target === "setup") {
      setSavedUserData(null);
      setIsSampleMode(false);
      clearStorage();
      setData(null);
      setMode("setup");
    } else {
      setSavedUserData(null);
      setIsSampleMode(false);
      setData(null);
      setMode("choose");
    }
  }

  if (mode === "setup") return <SetupWizard onComplete={d => { setData(d); setSavedUserData(null); setIsSampleMode(false); setMode("map"); }} onBack={() => setMode("choose")} />;
  return <MomentumMap data={data} setData={setData} onReset={handleReset} onShare={handleShare} onExport={handleExportJSON} onImport={handleImportJSON} onImportCSV={handleImportFullCSV} isSampleMode={isSampleMode} hasSavedMap={!!savedUserData} />;
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(MarketingMomentumMap));
  </script>
</body>
